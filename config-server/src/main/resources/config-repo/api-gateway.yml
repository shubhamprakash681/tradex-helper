server:
  port: ${API_GATEWAY_PORT}

tradex:
  services:
    auth: lb://auth-service
    market: lb://market-service
    portfolio: lb://portfolio-service
    price-stream: lb://price-stream-service
    price-stream-ws: lb:ws://price-stream-service

spring:
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Market Service
        url: /market/v3/api-docs
      - name: Portfolio Service
        url: /portfolio/v3/api-docs
      - name: Price Stream Service
        url: /prices/v3/api-docs


test:
  my-name: api-default
