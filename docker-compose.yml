networks:
  myapp_network:
    driver: bridge

volumes:
  postgres_data:
    name: tradex_postgres_volume
  pgadmin_data:
    name: tradex_pgadmin_volume
  config_rabbitmq_data:
    name: tradex_config_rabbitmq_volume
  redis_data:
    name: tradex_redis_volume
  kafka_data:
    name: tradex_kafka_volume
